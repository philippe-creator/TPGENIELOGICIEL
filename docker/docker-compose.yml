version: "3.8" 

services: 
  frontend: 
    build: 
      context: ./frontend 
    ports: 
      - "8080:80" 
    networks: 
      - app-network 

  db: 
    image: postgres:13 
    environment: 
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=myapp 
    env_file: 
      - ./backend/db.env 
    volumes: 
      - db-data:/var/lib/postgresql/data 
    networks: 
      - app-network 

  pgadmin: 
    image: dpage/pgadmin4 
    environment: 
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com 
      - PGADMIN_DEFAULT_PASSWORD=admin 
    ports: 
      - "5050:80" 
    depends_on: 
      - db 
    networks: 
      - app-network 

volumes: 
  db-data: 

networks: 
  app-network: 
